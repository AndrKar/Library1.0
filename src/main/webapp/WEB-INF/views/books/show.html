<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Книга</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .nav-links {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ddd;
        }
        .nav-links a {
            margin-right: 15px;
            text-decoration: none;
            color: #007bff;
        }
        h2 {
            color: #333;
            margin-top: 0;
        }
        .info {
            margin: 15px 0;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 5px;
        }
        .info p {
            margin: 8px 0;
        }
        .status {
            font-size: 18px;
            font-weight: bold;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }
        .status-free {
            background: #d4edda;
            color: #155724;
        }
        .status-taken {
            background: #fff3cd;
            color: #856404;
        }
        select, input[type="submit"] {
            padding: 8px;
            margin: 5px 0;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
        input[type="submit"] {
            background: #007bff;
            color: white;
            cursor: pointer;
            border: none;
            padding: 10px 20px;
        }
        input[type="submit"]:hover {
            background: #0056b3;
        }
        .btn-edit, .btn-delete, .btn-back {
            display: inline-block;
            margin: 10px 10px 0 0;
            padding: 8px 15px;
            background: #6c757d;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .btn-edit {
            background: #ffc107;
            color: #333;
        }
        .btn-delete {
            background: #dc3545;
        }
        hr {
            margin: 20px 0;
        }
    </style>
</head>
<body>
<div class="nav-links">
    <a href="/">🏠 На главную</a>
    <a href="/books">📚 Книги</a>
    <a href="/people">👥 Читатели</a>
</div>

<div class="card">
    <h2>📖 <span th:text="${book.title}"></span></h2>

    <div class="info">
        <p><strong>Автор:</strong> <span th:text="${book.author}"></span></p>
        <p><strong>Год:</strong> <span th:text="${book.year}"></span></p>
    </div>

    <!-- Статус книги -->
    <div th:if="${book.personId == null}" class="status status-free">
        ✅ Книга свободна
    </div>
    <div th:if="${book.personId != null}" class="status status-taken">
        📖 Читает: <strong th:text="${book.personName}"></strong>
    </div>

    <!-- Выдача книги -->
    <div th:if="${book.personId == null}">
        <h3>📤 Выдать книгу</h3>
        <form th:method="post" th:action="@{/books/{id}/take(id=${book.id})}">
            <select name="personId" required>
                <option value="">-- Выберите читателя --</option>
                <option th:each="person : ${people}"
                        th:value="${person.id}"
                        th:text="${person.name}">
                </option>
            </select>
            <br/><br/>
            <input type="submit" value="✅ Выдать"/>
        </form>
    </div>

    <!-- Возврат книги -->
    <div th:if="${book.personId != null}">
        <form th:method="post" th:action="@{/books/{id}/return(id=${book.id})}">
            <input type="submit" value="🔄 Вернуть книгу"/>
        </form>
    </div>

    <hr/>

    <a th:href="@{/books/{id}/edit(id=${book.id})}" class="btn-edit">✏️ Редактировать</a>

    <form th:method="post" th:action="@{/books/{id}(id=${book.id})}" style="display: inline;">
        <input type="hidden" name="_method" value="delete"/>
        <input type="submit" value="🗑 Удалить" class="btn-delete"
               onclick="return confirm('Точно удалить?')"/>
    </form>

    <a href="/books" class="btn-back">← Назад к списку</a>
</div>
</body>
</html>
