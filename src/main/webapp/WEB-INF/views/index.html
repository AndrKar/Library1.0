<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Библиотека</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .menu {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
        }
        .links a {
            text-decoration: none;
            color: white;
            background: #007bff;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 18px;
        }
        .links a:hover {
            background: #0056b3;
        }
        .image-container {
            text-align: center;
            margin-top: 40px;
        }
        .image-container img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
<div class="menu">
    <h1>📚 Добро пожаловать в библиотеку</h1>
    <h1>Эрика Картмана!</h1>
    <div class="links">
        <a href="/books">📖 Книги</a>
        <a href="/people">👥 Читатели</a>
    </div>

    <div class="image-container">
        <img src="/images/eric1.jpg" alt="Eric">
    </div>
</div>
</body>
</html>
