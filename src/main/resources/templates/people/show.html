<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Читатель</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .nav-links {
            margin-bottom: 20px;
        }
        .nav-links a {
            margin-right: 15px;
            text-decoration: none;
            color: #007bff;
        }
        .info {
            background: #e9ecef;
            padding: 15px;
            border-radius: 5px;
            margin: 15px 0;
        }
        .btn-edit {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 15px;
            background: #ffc107;
            color: #333;
            text-decoration: none;
            border-radius: 5px;
        }
        .btn-delete {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="nav-links">
    <a href="/">🏠 На главную</a>
    <a href="/books">📚 Книги</a>
    <a href="/people">👥 Читатели</a>
</div>

<div class="card">
    <h2>👤 <span th:text="${person.name}"></span></h2>

    <div class="info">
        <p><strong>ID:</strong> <span th:text="${person.id}"></span></p>
        <p><strong>📅 Год рождения:</strong> <span th:text="${person.year}"></span></p>
    </div>

    <h3>📚 Книги на руках:</h3>

    <div th:if="${books.empty}" style="color: gray;">
        Нет книг
    </div>

    <ul th:if="${!books.empty}">
        <li th:each="book : ${books}">
            <a th:href="@{/books/{id}(id=${book.id})}" th:text="${book.title}"></a>
            (<span th:text="${book.author}"></span>, <span th:text="${book.year}"></span>)
        </li>
    </ul>

    <a th:href="@{/people/{id}/edit(id=${person.id})}" class="btn-edit">✏️ Редактировать</a>

    <form th:method="post" th:action="@{/people/{id}(id=${person.id})}" style="display: inline;">
        <input type="hidden" name="_method" value="delete"/>
        <input type="submit" value="🗑 Удалить" class="btn-delete"
               onclick="return confirm('Точно удалить читателя?')"/>
    </form>
</div>
</body>
</html>
