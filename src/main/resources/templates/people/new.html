<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Новый читатель</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .nav-links {
            margin-bottom: 20px;
        }
        .nav-links a {
            margin-right: 15px;
            text-decoration: none;
            color: #007bff;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ddd;
            box-sizing: border-box;
        }
        input[type="submit"] {
            background: #28a745;
            color: white;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="nav-links">
    <a href="/">🏠 На главную</a>
    <a href="/books">📚 Книги</a>
    <a href="/people">👥 Читатели</a>
</div>

<div class="card">
    <h2>➕ Добавить читателя</h2>

    <form th:method="post" th:action="@{/people}" th:object="${person}">
        <label>Имя:</label>
        <input type="text" th:field="*{name}" required/>

        <label>Год рождения:</label>
        <input type="number" th:field="*{year}" id="year"/>
        <div style="color: red" th:if="${#fields.hasErrors('year')}" th:errors="*{year}">error</div>

        <input type="submit" value="📥 Сохранить"/>
    </form>
</div>
</body>
</html>
